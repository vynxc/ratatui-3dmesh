name: Release

# Publishes to crates.io when a version tag (e.g. v0.1.0) is pushed.
# Requires a CARGO_REGISTRY_TOKEN repository secret:
#   Settings -> Secrets and variables -> Actions -> New repository secret
# Create the token at https://crates.io/settings/tokens with the "publish-update"
# scope. Without the secret the publish step is skipped (the dry run still runs).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    # Lift the secret to job scope so the step-level `if` can read it; a step that
    # defines the env itself cannot gate on it in the same step.
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify the package builds and tests pass
        run: cargo test --all-features
      - name: Dry-run package
        run: cargo publish --all-features --dry-run
      - name: Publish
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: cargo publish --all-features
