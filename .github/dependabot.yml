version: 2
updates:
  # Rust crate dependencies in Cargo.toml.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "deps"

  # The GitHub Actions used by the workflows above.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
